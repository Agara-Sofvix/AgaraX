events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain application/json text/css application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name agarax.com www.agarax.com;

        # Allow file uploads up to 10 MB (covers 5 MB resume + multipart overhead)
        client_max_body_size 10m;

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API (includes /api/applications file upload)
        location /api {
            proxy_pass http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;  # give upload time to finish on slow connections
        }

        # Serve uploaded resumes directly through Nginx (optional optimisation)
        location /uploads {
            proxy_pass http://backend:5000/uploads;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Backend Health Check
        location /health {
            proxy_pass http://backend:5000/health;
        }
    }
}
