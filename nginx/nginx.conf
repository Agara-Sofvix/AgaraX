events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain application/json text/css application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 🔴 HTTP → HTTPS redirect
    server {
        listen 80;
        server_name agarax.com www.agarax.com;

        return 301 https://$host$request_uri;
    }

    # 🔒 HTTPS SERVER
    server {
        listen 443 ssl;
        server_name agarax.com www.agarax.com;

        ssl_certificate /etc/letsencrypt/live/agarax.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agarax.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Allow file uploads up to 10 MB
        client_max_body_size 10m;

        # 🔹 Frontend
        location / {
            proxy_pass http://frontend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # 🔹 Backend API
        location /api {
            proxy_pass http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
        }

        # 🔹 Uploads
        location /uploads {
            proxy_pass http://backend:5000/uploads;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # 🔹 Health check
        location /health {
            proxy_pass http://backend:5000/health;
        }
    }
}
