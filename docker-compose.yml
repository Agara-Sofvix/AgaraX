version: "3.9"

services:
  mongodb:
    image: mongo:latest
    container_name: agara-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agara-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    container_name: agara-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/AgaraX}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - agara-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
    container_name: agara-frontend
    restart: unless-stopped
    ports:
      - "3000:5000"
    env_file:
      - .env.production
    environment:
      - INTERNAL_API_URL=http://backend:5000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - agara-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:latest
    container_name: agara-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"   # 🔒 HTTPS enabled
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # 🔒 SSL mount
    depends_on:
      - frontend
      - backend
    networks:
      - agara-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  agara-network:
    driver: bridge

volumes:
  mongodb_data:
